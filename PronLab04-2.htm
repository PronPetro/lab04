<html>
    <head>
        <title>Рядок, що біжить</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="utf-8">
    </head>
    <body background="images/fon.jpg">
        <p align="center">
            <br><br><br>
            <marquee width=800 height=20 behavior="alternate">
                <b><i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                </i></b>
            </marquee>
            <br>
            <marquee width=800 height=20 direction="left">
                <b><i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                </i></b>
            </marquee>
            <br>
            <marquee width=800 height=20 behavior="slide" direction="right">
                <b><i>
                        ПРИКЛАД РЯДКА, ЩО (не) БІЖИТЬ
                </i></b>
            </marquee>
            <br>
            <marquee width=800 height=20 behavior="scroll" scrolldelay="60">
                <b><i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                </i></b>
            </marquee>
            <br>
            <marquee width=800 height=20 behavior="scroll" scrolldelay="320">
                <b><i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                </i></b>
            </marquee>
        </p>
    </body>
</html>
