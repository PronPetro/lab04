<html>
    <head>
        <title>Рядок, що біжить</title>
        <meta charset="utf-8">
    </head>
    <body background="images/fon.jpg" text="#FFFAFA">
        <font face="Verdana" size="4" color="#8b008b">
        <p align="center">
            <br><br><br>
            <marquee width=800 height=20 bgColor="#99ff00" behavior="alternate">
                <b>
                    <i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                    </i>
                </b>
            </marquee>
            <br>
            <marquee width=800 height=20 bgColor="#ffbb00" direction="left">
                <b>
                    <i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                    </i>
                </b>
            </marquee>
            <br>
            <marquee width=800 height=20 bgColor="#ff0055" behavior="slide" direction="right">
                <b>
                    <i>
                        ПРИКЛАД РЯДКА, ЩО (НЕ) БІЖИТЬ
                    </i>
                </b>
            </marquee>
            <br>
            <marquee width=800 height=20 bgColor="#0040ff" behavior="scroll" scrolldelay="60">
                <b>
                    <i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                    </i>
                </b>
            </marquee>
            <br>
            <marquee width=800 height=20 bgColor="#9500ff" behavior="scroll" scrolldelay="320">
                <b>
                    <i>
                        ПРИКЛАД РЯДКА, ЩО БІЖИТЬ
                    </i>
                </b>
            </marquee>
        </p>
    </font>
    </body>
</html>
